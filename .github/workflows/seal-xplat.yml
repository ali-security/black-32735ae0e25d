name: Test

on:
  push:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  main:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.8", "3.9", "3.10", "3.11", "3.12", "pypy-3.9"]
        os: [ubuntu-latest, macos-latest, windows-latest]
        exclude:
          - { os: macos-latest, python-version: "3.8" }
          - { os: macos-latest, python-version: "pypy-3.9" }

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install tox
        run: |
          python -m pip install --upgrade pip
          python -m pip install --upgrade tox

      - name: Unit tests
        if: "!startsWith(matrix.python-version, 'pypy')"
        run:
          tox -e ci-py$(echo ${{ matrix.python-version }} | tr -d '.') -- -v --color=yes

      - name: Unit tests (pypy)
        if: "startsWith(matrix.python-version, 'pypy')"
        run: tox -e ci-pypy3 -- -v --color=yes


  uvloop:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Set up latest Python
        uses: actions/setup-python@v5
        with:
          python-version: "*"

      - name: Install black with uvloop
        run: |
          python -m pip install pip --upgrade --disable-pip-version-check
          python -m pip install -e ".[uvloop]"

      - name: Format ourselves
        run: python -m black --check .
